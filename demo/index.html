<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SSTL 搜索套利投放操作系统 Demo</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --line: #e5e7eb;
      --line-2: #dbe2ea;
      --text: #172033;
      --muted: #6b7280;
      --soft: #94a3b8;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --green: #0f9f6e;
      --red: #dc2626;
      --orange: #d97706;
      --purple: #7c3aed;
      --cyan: #0284c7;
      --shadow: 0 10px 28px rgba(15, 23, 42, .10);
      --radius: 8px;
      --sidebar: 248px;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { margin: 0; min-height: 100vh; background: var(--bg); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { display: grid; grid-template-columns: var(--sidebar) 1fr; min-height: 100vh; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: #111827;
      color: #e5e7eb;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 14px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-title { font-weight: 700; line-height: 1.2; }
    .brand-sub { display: block; color: #9ca3af; font-size: 12px; font-weight: 500; margin-top: 2px; }

    .nav-section { margin: 12px 0; }
    .nav-title {
      color: #9ca3af;
      font-size: 12px;
      padding: 8px 10px;
      letter-spacing: .02em;
    }

    .nav-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: #d1d5db;
      text-align: left;
      padding: 10px 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: .16s ease;
      margin: 2px 0;
    }

    .nav-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-btn.active { background: #2563eb; color: #fff; }
    .nav-icon { width: 20px; text-align: center; font-size: 14px; opacity: .9; }

    .main { min-width: 0; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 22px;
    }

    .top-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .page-heading { font-size: 18px; font-weight: 750; white-space: nowrap; }
    .top-meta { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .search {
      width: 260px;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      padding: 9px 11px;
      background: #fff;
      color: var(--text);
    }
    .date-pill, .user-pill {
      border: 1px solid var(--line-2);
      background: #fff;
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .content { padding: 22px; max-width: 1680px; margin: 0 auto; min-width: 0; }
    .page { display: none; }
    .page.active { display: block; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .toolbar h2 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .toolbar p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line-2);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: .16s ease;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-2); color: #fff; }
    .btn.danger { color: var(--red); border-color: #fecaca; background: #fffafa; }
    .btn.ghost { border-color: transparent; background: transparent; }
    .btn.small { min-height: 30px; padding: 5px 9px; font-size: 12px; }

    .grid { display: grid; gap: 14px; }
    .grid > * { min-width: 0; }
    .grid.cols-6 { grid-template-columns: repeat(6, minmax(0,1fr)); }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15,23,42,.03);
      min-width: 0;
    }
    .card.pad { padding: 16px; }
    .metric { padding: 14px; min-height: 104px; }
    .metric-label { color: var(--muted); font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .metric-value { margin-top: 10px; font-size: 24px; font-weight: 760; letter-spacing: 0; }
    .metric-sub { margin-top: 8px; font-size: 12px; color: var(--soft); }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .warn { color: var(--orange); }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .panel-title small { color: var(--muted); font-weight: 500; }

    .filters {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr)) auto;
      gap: 10px;
      align-items: end;
      padding: 14px;
      margin-bottom: 14px;
    }
    .field label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      min-height: 36px;
    }
    .field textarea { min-height: 82px; resize: vertical; }

    .table-wrap { width: 100%; max-width: 100%; min-width: 0; overflow: auto; overscroll-behavior-x: contain; -webkit-overflow-scrolling: touch; border-radius: var(--radius); border: 1px solid var(--line); background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; background: #fff; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: middle; }
    th { background: #f8fafc; color: #475569; font-weight: 700; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
    td { color: #1f2937; }
    tr:hover td { background: #fbfdff; }
    .cell-main { font-weight: 680; color: var(--text); }
    .cell-sub { color: var(--muted); font-size: 12px; margin-top: 3px; word-break: break-all; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }

    .tag, .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
      line-height: 1.4;
    }
    .tag.blue, .status.active, .status.normal { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag.green, .status.success { background: #ecfdf5; color: #047857; border-color: #bbf7d0; }
    .tag.red, .status.failed, .status.blocked { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .tag.orange, .status.warn, .status.fallback { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .tag.purple, .status.enhanced { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
    .tag.gray, .status.inactive, .status.pending { background: #f3f4f6; color: #4b5563; border-color: #e5e7eb; }

    .chart {
      height: 230px;
      padding: 14px 16px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
    }
    .bars {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      align-items: end;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 0 4px;
    }
    .bar-group { display: flex; align-items: end; gap: 3px; justify-content: center; height: 160px; }
    .bar { width: 7px; border-radius: 3px 3px 0 0; min-height: 8px; }
    .bar.spend { background: #f87171; }
    .bar.revenue { background: #34d399; }
    .bar.profit { background: #60a5fa; }
    .chart-legend { display: flex; gap: 14px; color: var(--muted); font-size: 12px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }

    .risk-list { display: grid; gap: 8px; padding: 12px; }
    .risk-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .risk-mark { width: 9px; height: 36px; border-radius: 8px; background: var(--orange); }
    .risk-mark.red { background: var(--red); }
    .risk-mark.purple { background: var(--purple); }

    .drawer-overlay, .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 60;
      background: rgba(15, 23, 42, .34);
    }
    .drawer-overlay.open, .modal-overlay.open { display: block; }
    .drawer {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: min(720px, 96vw);
      background: #fff;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      transform: translateX(0);
    }
    .drawer-header, .modal-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .drawer-header h3, .modal-header h3 { margin: 0; font-size: 18px; }
    .drawer-body { padding: 16px 18px; overflow: auto; }
    .drawer-footer, .modal-footer {
      border-top: 1px solid var(--line);
      padding: 13px 18px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #fff;
    }
    .close {
      border: 0;
      background: #f3f4f6;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      color: #475569;
    }

    .modal {
      width: min(760px, calc(100vw - 28px));
      max-height: min(82vh, 760px);
      overflow: hidden;
      background: #fff;
      border-radius: 8px;
      box-shadow: var(--shadow);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .modal-body { padding: 16px 18px; overflow: auto; }

    .steps { display: flex; gap: 8px; margin-bottom: 14px; }
    .step {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      background: #f3f4f6;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    .step.active { background: #eff6ff; color: var(--primary); font-weight: 700; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .form-grid .span-2 { grid-column: 1 / -1; }
    .summary-box {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 8px;
      padding: 12px;
      color: #334155;
      line-height: 1.7;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 90;
      display: none;
      min-width: 230px;
      max-width: 360px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      font-size: 13px;
    }
    .toast.show { display: block; animation: toast .18s ease; }
    @keyframes toast { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line-2);
      border-radius: 8px;
      background: #fff;
    }
    .error-state {
      padding: 12px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .skeleton {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #eef2f7, #f8fafc, #eef2f7);
      background-size: 180% 100%;
      animation: shimmer 1.2s infinite linear;
    }
    @keyframes shimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }

    .mobile-nav-toggle { display: none; }
    .hide { display: none !important; }

    @media (max-width: 1180px) {
      .grid.cols-6 { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .grid.cols-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .filters { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .search { width: 190px; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        z-index: 50;
        width: min(84vw, 310px);
        transform: translateX(-105%);
        transition: transform .18s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-nav-toggle { display: inline-flex; }
      .topbar { height: auto; min-height: 60px; padding: 10px 12px; flex-wrap: wrap; }
      .top-left { width: 100%; justify-content: space-between; }
      .top-actions { width: 100%; overflow-x: auto; padding-bottom: 2px; }
      .content { padding: 14px; }
      .grid.cols-6, .grid.cols-4, .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
      .toolbar { align-items: flex-start; flex-direction: column; }
      .filters { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .metric-value { font-size: 22px; }
      .drawer { width: 100vw; }
      .date-pill, .user-pill { display: none; }
      .search { flex: 1; min-width: 210px; }
    }
  </style>
</head>

      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }
    function copyText(text) {
      if (!text || text === "-") return toast("暂无可复制内容");
      navigator.clipboard?.writeText(text).then(() => toast("已复制到剪贴板")).catch(() => toast("复制成功（原型模拟）"));

            </button>
          `).join("")}
        </div>

      openModal("跨账号复制任务预览", `
        <div class="summary-box">预计创建 18 个 Campaign、54 个 Adgroup、162 条 Ads。提交后可在任务中心查看进度。</div>
        ${table(["目标账号", "Campaign 数", "Pixel", "授权", "预检查"], [
          `<tr><td>US Coupon Account 02</td><td>3</td><td>默认 Pixel</td><td>${status("正常", "success")}</td><td>${status("通过", "success")}</td></tr>`,
          `<tr><td>US Coupon Account 03</td><td>3</td><td>默认 Pixel</td><td>${status("即将过期", "warn")}</td><td>${status("风险", "warn")}</td></tr>`,
          `<tr><td>US Coupon Account 04</td><td>3</td><td>覆盖 Pixel</td><td>${status("正常", "success")}</td><td>${status("通过", "success")}</td></tr>`
        ].join(""))}
      `, `<button class="btn" data-close="modal">取消</button><button class="btn primary" onclick="toast('复制任务已提交'); closeModal(); state.page='tasks'; render()">提交任务</button>`);
    }

    function openTaskDrawer(id) {
      const t = data.tasks.find(x => x.id === id) || data.tasks[0];
      openDrawer("任务详情", `
        <div class="summary-box">任务：${t.id}<br>类型：${t.type}<br>状态：${t.status}<br>进度：${t.success}/${t.total}</div>
        ${table(["对象", "状态", "说明"], [
          `<tr><td>Campaign copy 01</td><td>${status("成功", "success")}</td><td>已创建</td></tr>`,
          `<tr><td>Campaign copy 02</td><td>${status("失败", "failed")}</td><td>Pixel 不可用</td></tr>`,
          `<tr><td>Campaign copy 03</td><td>${status("运行中", "enhanced")}</td><td>等待 TikTok 返回</td></tr>`
        ].join(""))}
      `, `<button class="btn" data-feedback="失败明细已导出">导出失败明细</button><button class="btn primary" data-feedback="已重试失败项">重试失败</button>`);
    }

    function openMaterialDrawer(name) {
      const m = data.materials.find(x => x.name === name) || data.materials[0];
      openDrawer("素材 AI 分析详情", `
        <div class="grid cols-2">
          <div class="summary-box"><b>${m.name}</b><br>AI Score：${m.score}<br>语言：${m.lang}<br>风险：${m.risk}</div>
          <div class="summary-box">Spend：${money(m.spend)}<br>Revenue：${money(m.revenue)}<br>ROI：${m.roi.toFixed(2)}<br>建议：${m.suggestion}</div>
        </div>
        <div style="margin-top:14px">${table(["AI 项", "结果"], [
          `<tr><td>素材摘要</td><td>前 3 秒有明确利益点，适合搜索套利 H5 引流。</td></tr>`,
          `<tr><td>适配国家</td><td>US, CA</td></tr>`,
          `<tr><td>适配关键词</td><td>coupon, discount, near me</td></tr>`,
          `<tr><td>风险点</td><td>文案承诺需避免过度绝对化</td></tr>`,
          `<tr><td>AI 成本</td><td>input 4,820 tokens / output 620 tokens / $0.018</td></tr>`
        ].join(""))}</div>
      `, `<button class="btn" data-feedback="已提交重新分析">重新分析</button><button class="btn primary" data-feedback="已加入批量建计划素材篮">加入素材篮</button>`);
    }

    function openComplianceModal() {
      openModal("TONIC declined 联动确认", `
        <div class="error-state">检测到 1 个 declined Offer。建议暂停 Offer，并将关联 Campaign 切换到兜底页。该动作会影响 2 个 Campaign。</div>
        ${table(["对象", "当前状态", "建议动作"], [
          `<tr><td>Tonic - Insurance Backup</td><td>${status("declined", "failed")}</td><td>暂停 Offer</td></tr>`,
          `<tr><td>CAMP7B4Q02</td><td>${status("启用", "success")}</td><td>切换兜底页</td></tr>`
        ].join(""))}
      `, `<button class="btn" data-close="modal">取消</button><button class="btn" onclick="openDryRun()">先 Dry-run</button><button class="btn danger" onclick="toast('合规联动动作已提交（原型模拟）'); closeModal()">确认联动</button>`);
    }

    function dangerConfirm(title, desc) {
      openModal(title, `<div class="error-state">${desc}</div><p>该操作会记录审计日志。请确认影响范围后再执行。</p>`,
        `<button class="btn" data-close="modal">取消</button><button class="btn danger" onclick="toast('${title} 已提交'); closeModal()">确认${title}</button>`);
    }

    $("#mobileNavBtn").addEventListener("click", () => $("#sidebar").classList.toggle("open"));
    $("#globalSearch").addEventListener("keydown", e => {
      if (e.key === "Enter") toast("全局搜索：" + e.target.value);
    });
    $("#drawerOverlay").addEventListener("click", e => { if (e.target.id === "drawerOverlay") closeDrawer(); });
    $("#modalOverlay").addEventListener("click", e => { if (e.target.id === "modalOverlay") closeModal(); });

    window.openOfferDrawer = openOfferDrawer;
    window.openCampaignCreate = openCampaignCreate;
    window.renderCampaignCreateDrawer = renderCampaignCreateDrawer;
    window.openCampaignDrawer = openCampaignDrawer;
    window.openWeightModal = openWeightModal;
    window.openLogDrawer = openLogDrawer;
    window.openDryRun = openDryRun;
    window.openAutomationDrawer = openAutomationDrawer;
    window.openExecutionDrawer = openExecutionDrawer;
    window.openCopyPreview = openCopyPreview;
    window.openTaskDrawer = openTaskDrawer;
    window.openMaterialDrawer = openMaterialDrawer;
    window.openComplianceModal = openComplianceModal;
    window.dangerConfirm = dangerConfirm;
    window.copyText = copyText;
    window.toast = toast;
    window.closeDrawer = closeDrawer;
    window.closeModal = closeModal;
    window.render = render;
    window.state = state;

    render();
  </script>
</body>
</html>
