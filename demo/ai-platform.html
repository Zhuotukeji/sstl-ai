    .grid > * { min-width:0; }
    .grid.cols-6 { grid-template-columns:repeat(6,minmax(0,1fr)); }
    .grid.cols-5 { grid-template-columns:repeat(5,minmax(0,1fr)); }
    .grid.cols-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .grid.cols-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .grid.cols-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }

    th:last-child, td:last-child { position:sticky; right:0; background:inherit; box-shadow:-1px 0 0 var(--line); }

    .cell-main { font-weight:680; color:var(--text); }

    .tag.red, .status.failed, .status.rejected, .status.high { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }
    .tag.orange, .status.pending, .status.medium, .status.review { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }

    .chat-shell { display:grid; grid-template-columns:260px minmax(0,1fr) 320px; gap:14px; }
    .chat-list, .chat-context { min-height:540px; }
    .chat-main { min-height:540px; display:grid; grid-template-rows:1fr auto; }

    .drawer-overlay, .modal-overlay { position:fixed; inset:0; display:none; z-index:60; background:rgba(15,23,42,.34); }
    .drawer-overlay.open, .modal-overlay.open { display:block; }
    .drawer { position:absolute; right:0; top:0; height:100%; width:min(760px,96vw); background:#fff; box-shadow:var(--shadow); display:grid; grid-template-rows:auto 1fr auto; }
    .drawer.wide { width:min(980px,98vw); }
    .modal { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(860px,94vw); max-height:88vh; display:grid; grid-template-rows:auto 1fr auto; background:#fff; border-radius:10px; box-shadow:var(--shadow); overflow:hidden; }
    .drawer-header, .modal-header { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:12px; }

    .close { width:32px; height:32px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--muted); }
    .drawer-body, .modal-body { overflow:auto; padding:18px; }
    .drawer-footer, .modal-footer { padding:13px 18px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px; background:#fff; }

      .content { padding:14px; }
      .grid.cols-6, .grid.cols-5, .grid.cols-4, .grid.cols-3, .grid.cols-2 { grid-template-columns:1fr; }
      .flow { grid-template-columns:1fr; }
      .toolbar { align-items:flex-start; flex-direction:column; }
      .filters, .form-grid { grid-template-columns:1fr; }
      .field.span-2 { grid-column:span 1; }
      .metric-value { font-size:22px; }
      .drawer { width:100vw; }
      .date-pill, .user-pill { display:none; }
      .search { flex:1; min-width:210px; }
    }
  </style>
</head>

          `<tr><td>知识片段</td><td>kb_101 低 ROI SOP, kb_105 critical CPA 指标口径</td></tr>`,
          `<tr><td>实时数据摘要</td><td>spend $3,842, revenue $2,976, profit -$866, ROI 0.77</td></tr>`,
          `<tr><td>裁剪原因</td><td>舍弃低相似度案例 6 条，保留高优先级 SOP 和指标口径。</td></tr>`,
          `<tr><td>安全规则</td><td>高风险动作只能 dry-run，禁止直接执行。</td></tr>`
        ])}
      `, `<button class="btn" data-close="drawer">关闭</button><button class="btn primary" onclick="openAnalysisDrawer('an_1')">生成分析结果</button>`, true);
    }

    function openAnalysisDrawer(id) {
      const a = data.analysisResults.find(x => x.id === id) || data.analysisResults[0];
      openDrawer("AI 数据分析结果", `
        <div class="grid cols-2">
          <div class="summary-box"><b>总结结论</b><br>${a.summary}</div>
          <div class="summary-box"><b>核心证据</b><br>${a.evidence}<br>置信度：${a.confidence}</div>
        </div>
        <div style="margin-top:14px">${table(["分析项", "内容"], [
          `<tr><td>分析对象</td><td>${a.target}</td></tr>`,
          `<tr><td>原因排序</td><td>${a.causes}</td></tr>`,
          `<tr><td>建议动作</td><td>${a.actions}</td></tr>`,
          `<tr><td>使用 Skill</td><td>${a.skills}</td></tr>`,
          `<tr><td>引用知识</td><td>${a.knowledge}</td></tr>`,
          `<tr><td>数据源</td><td>${a.sources}</td></tr>`,
          `<tr><td>动作安全</td><td>涉及暂停/调预算时必须先 dry-run，不直接执行。</td></tr>`
        ])}</div>
      `, `<button class="btn" data-feedback="已标记为有用">有用</button><button class="btn" data-feedback="已保存为复盘知识草稿">沉淀为知识</button><button class="btn primary" onclick="openDryRunModal()">生成 Dry-run</button>`, true);
    }

    function openDryRunModal() {
      openModal("智能投放 Dry-run", `
        <div class="error-state">高风险动作保护：AI 只能生成 dry-run 和影响面，不能直接暂停广告或调整预算。</div>
        ${table(["影响对象", "当前状态", "命中原因", "建议动作", "预计影响", "风险", "回滚建议"], [
          `<tr><td>CAMP7B4Q02</td><td>启用 · ROI 0.82</td><td>spend > 1000 且 ROI < 1</td><td>暂停 Campaign</td><td>预计节省 $420-$610</td><td>${status("高", "high")}</td><td>保留原预算和出价快照</td></tr>`,
          `<tr><td>adset_7821</td><td>启用 · 无转化</td><td>24h spend $86.70 且 conversions = 0</td><td>暂停 Adset</td><td>预计节省 $80-$120</td><td>${status("中", "medium")}</td><td>24h 后可人工恢复</td></tr>`
        ])}
      `, `<button class="btn" data-close="modal">取消</button><button class="btn" data-feedback="Dry-run 结果已保存到审计日志">保存 Dry-run</button><button class="btn danger" data-feedback="已提交人工确认，未真实执行">提交人工确认</button>`);
    }

    function openCreativeModal(id) {
      const c = data.creativeBriefs.find(x => x.id === id) || data.creativeBriefs[0];
      openModal("素材 Brief / 脚本生成", `
        <div class="summary-box"><b>${c.title}</b><br>国家：${c.country}<br>关键词：${c.keyword}<br>引用知识：${c.source}<br>风险：${c.risk}</div>
        <div style="margin-top:14px">${table(["输出项", "内容"], [
          `<tr><td>Brief</td><td>${c.output}</td></tr>`,
          `<tr><td>前 3 秒 Hook</td><td>Stop overpaying. Check nearby coupons before you buy.</td></tr>`,
          `<tr><td>分镜</td><td>痛点 -> 搜索动作 -> 折扣结果 -> CTA</td></tr>`,
          `<tr><td>CTA</td><td>Search now / Compare nearby offers</td></tr>`,
          `<tr><td>合规提醒</td><td>避免 guaranteed、100% saving 等绝对化表达。</td></tr>`
        ])}</div>
      `, `<button class="btn" data-feedback="已重新生成一个版本">重新生成</button><button class="btn primary" data-feedback="已保存为素材 Brief 草稿">保存 Brief</button>`);
    }

    function openImprovementModal(id) {
      const i = data.improvementSuggestions.find(x => x.id === id) || data.improvementSuggestions[0];
      openModal("AI 自我复盘改进建议", `
        <div class="summary-box"><b>${i.type} · ${i.target}</b><br>问题：${i.problem}<br>建议：${i.change}<br>影响：${i.impact}</div>
        <div style="margin-top:14px">${table(["复盘证据", "说明"], [
          `<tr><td>用户反馈</td><td>最近 7 天有 4 次标记“原因不完整”</td></tr>`,
          `<tr><td>效果跟踪</td><td>采纳建议后 ROI 改善不稳定</td></tr>`,
          `<tr><td>系统判断</td><td>需要补充知识或更新 Skill 数据源</td></tr>`
        ])}</div>
      `, `<button class="btn" data-close="modal">暂不处理</button><button class="btn" data-feedback="已生成知识更新草稿">采纳为知识更新草稿</button><button class="btn primary" data-feedback="已生成 Skill 改进草稿">采纳为 Skill 改进草稿</button>`);
    }

    function openTaskDrawer(id) {
      const t = data.tasks.find(x => x.id === id) || data.tasks[0];
      openDrawer("AI 任务详情", `
        <div class="summary-box">任务：${t.id}<br>类型：${t.type}<br>状态：${t.status}<br>进度：${t.progress}<br>成本：${t.cost}</div>
        <div style="margin-top:14px">${table(["步骤", "状态", "说明"], [
          `<tr><td>权限检查</td><td>${status("成功", "approved")}</td><td>已按用户范围过滤</td></tr>`,
          `<tr><td>Skill 调用</td><td>${status("成功", "approved")}</td><td>调用 3 个 Skill</td></tr>`,
          `<tr><td>知识检索</td><td>${status(t.status === "failed" ? "失败" : "成功", t.status === "failed" ? "failed" : "approved")}</td><td>${t.status === "failed" ? "知识索引超时" : "命中 5 条知识"}</td></tr>`
        ])}</div>
      `);
    }

    function openAuditDrawer(id) {
      const a = data.auditLogs.find(x => x.id === id) || data.auditLogs[0];
      openDrawer("AI 审计日志详情", `
        <div class="summary-box"><b>${a.id}</b><br>时间：${a.time}<br>用户：${a.user}<br>模块：${a.module}<br>结果：${a.result}</div>
        <div style="margin-top:14px">${table(["审计项", "内容"], [
          `<tr><td>Skill</td><td>${a.skill}</td></tr>`,
          `<tr><td>数据源</td><td>${a.data}</td></tr>`,
          `<tr><td>读取范围</td><td>${a.scope}</td></tr>`,
          `<tr><td>输出摘要</td><td>${a.summary}</td></tr>`,
          `<tr><td>风险等级</td><td>${a.risk}</td></tr>`,
          `<tr><td>成本</td><td>${a.cost}</td></tr>`,
          `<tr><td>脱敏</td><td>账号 ID、URL query、visitor id 已脱敏</td></tr>`
        ])}</div>
      `, `<button class="btn" data-feedback="审计信息已复制">复制排查信息</button>`);
    }

    function openKnowledgeReviewFromButton(id) { openKnowledgeReviewModal(id); }

    $("#mobileNavBtn").addEventListener("click", () => $("#sidebar").classList.toggle("open"));
    $("#globalSearch").addEventListener("keydown", e => {
      if (e.key === "Enter") toast("全局搜索：" + e.target.value);
    });
    $("#drawerOverlay").addEventListener("click", e => { if (e.target.id === "drawerOverlay") closeDrawer(); });
    $("#modalOverlay").addEventListener("click", e => { if (e.target.id === "modalOverlay") closeModal(); });

    window.state = state;
    window.render = render;
    window.toast = toast;
    window.openKnowledgeDrawer = openKnowledgeDrawer;
    window.openKnowledgeReviewModal = openKnowledgeReviewModal;
    window.openKnowledgeReviewFromButton = openKnowledgeReviewFromButton;
    window.openReferenceDrawer = openReferenceDrawer;
    window.openSkillDrawer = openSkillDrawer;
    window.openSkillDraftModal = openSkillDraftModal;
    window.openSkillReviewModal = openSkillReviewModal;
    window.openSkillTestModal = openSkillTestModal;
    window.openRouterModal = openRouterModal;
    window.openContextDrawer = openContextDrawer;
    window.openAnalysisDrawer = openAnalysisDrawer;
    window.openDryRunModal = openDryRunModal;
    window.openCreativeModal = openCreativeModal;
    window.openImprovementModal = openImprovementModal;
    window.openTaskDrawer = openTaskDrawer;
    window.openAuditDrawer = openAuditDrawer;
    window.closeDrawer = closeDrawer;
    window.closeModal = closeModal;

    render();
  </script>
</body>
</html>
